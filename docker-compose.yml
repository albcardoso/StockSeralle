version: "3.9"

# ── StockSync — Ambiente de Desenvolvimento ──────────────────────────────────
# Uso:
#   docker compose up          → sobe tudo (MongoDB + API + Frontend)
#   docker compose up mongo    → sobe só o banco
#   docker compose logs -f api → logs da API em tempo real

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: stocksync-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: stocksync_dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Mongo Express (UI para o banco em dev) ─────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: stocksync-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  # ── Backend .NET Core API ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stocksync-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__DatabaseName: stocksync_dev
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app/src  # hot-reload em dev

  # ── Frontend Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stocksync-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
      NODE_ENV: development
    depends_on:
      - api
    volumes:
      - ./frontend:/app  # hot-reload em dev
      - /app/node_modules  # evita sobrescrever node_modules do container

volumes:
  mongo_data:
